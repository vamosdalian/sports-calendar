name: Release Backend Image

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish to GHCR
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sports-calendar-api

jobs:
  publish:
    name: Build and publish backend image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Derive release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
            prerelease="${{ github.event.release.prerelease }}"
          else
            tag="${{ inputs.tag }}"
            prerelease="false"
          fi

          version="${tag#refs/tags/}"
          if [[ -z "$version" ]]; then
            echo "Release tag is required" >&2
            exit 1
          fi

          image_repo="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image_repo=$image_repo" >> "$GITHUB_OUTPUT"
          echo "publish_latest=$([[ "$prerelease" == "true" ]] && echo false || echo true)" >> "$GITHUB_OUTPUT"

      - name: Run backend tests
        working-directory: backend
        run: go test ./...

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.version.outputs.image_repo }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ steps.version.outputs.publish_latest == 'true' }}
          labels: |
            org.opencontainers.image.title=sports-calendar-api
            org.opencontainers.image.description=Sports Calendar backend API
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
