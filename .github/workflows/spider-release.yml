name: Release Spider Image

# Builds and publishes the Transfermarkt crawler (spider/) image to GHCR.
#
# Triggered by a published GitHub Release whose tag ends in `-sp`
# (e.g. v1.0.0-sp), so it runs INSTEAD of the backend workflow — a normal
# vX.Y.Z release builds the backend, a vX.Y.Z-sp release builds the spider.
# Also runnable manually via workflow_dispatch.
on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish to GHCR (e.g. v1.0.0-sp)
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sports-spider

jobs:
  publish:
    name: Build and publish spider image
    runs-on: ubuntu-latest
    # Only build for -sp releases (or manual dispatch). Plain releases are the
    # backend's job and are ignored here.
    if: ${{ github.event_name == 'workflow_dispatch' || endsWith(github.event.release.tag_name, '-sp') }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
            prerelease="${{ github.event.release.prerelease }}"
          else
            tag="${{ inputs.tag }}"
            prerelease="false"
          fi

          version="${tag#refs/tags/}"
          if [[ -z "$version" ]]; then
            echo "Release tag is required" >&2
            exit 1
          fi

          image_repo="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image_repo=$image_repo" >> "$GITHUB_OUTPUT"
          echo "publish_latest=$([[ "$prerelease" == "true" ]] && echo false || echo true)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        working-directory: spider
        run: python -m compileall app

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.version.outputs.image_repo }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ steps.version.outputs.publish_latest == 'true' }}
          labels: |
            org.opencontainers.image.title=sports-spider
            org.opencontainers.image.description=Transfermarkt crawler (FastAPI + scraper worker)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push spider image
        uses: docker/build-push-action@v6
        with:
          context: spider
          file: spider/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
