server:
  port: 8080

rateLimit:
  requestsPerSecond: 8
  burst: 16

database:
  host: CHANGE_ME_DB_HOST
  port: 5432
  dbname: sports_calendar
  user: sports_calendar
  password: CHANGE_ME_DB_PASSWORD
  sslmode: disable

theSportsDB:
  baseURL: https://www.thesportsdb.com
  apiKey: CHANGE_ME_THESPORTSDB_KEY
  timeoutSeconds: 15

refreshExecutor:
  qps: 1

adminAuth:
  secret: CHANGE_ME_LONG_RANDOM_SECRET
  tokenTTLMinutes: 30

# Admin-only reverse proxy to the sports-spider (Transfermarkt crawler) backend.
# The crawler is not exposed publicly; the admin "Crawler" page reaches it through
# /api/spider/* which reuses admin auth. Leave upstreamURL empty to disable.
# On the server the spider app container is reachable on the shared docker network
# (sports-calendar-net) as http://tm_app:8000. For local dev use the host port,
# e.g. http://localhost:8001.
spider:
  upstreamURL: ""
